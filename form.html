<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel='stylesheet' href='https://easycss.github.io/easyform/form.css' />
	<title>FORM</title>
</head>
<body>
	<div class="form-container">
		<form action="" method="">
		
		<!-- HIDDEN FIELD -->
		
		<!-- <input type="hidden" name="form-name" value="form" /> -->
		
		<!-- \HIDDEN FIELD -->
		
		<div class="form">
			
			<!-- INPUT FIELDS -->
			<div class="input-fields">
				<input type="text" name="name" class="input" placeholder="Your name" value=""> 
				<div class="errors"></div>
				<input type="text" name="email" class="input" placeholder="Your email" value="">
				<div class="errors"></div>
			</div><!-- \INPUT FIELDS -->
	
			<!-- TEXT AREA -->
			<div class="message">
				<textarea name="message" placeholder="Enter your message"></textarea>
			</div><!-- \TEXT AREA -->
	
			<!-- SUBMIT BUTTON -->
			<div class="submit">
				<input type="submit" name="submit" value="send" class="btn">
			</div><!-- \SUBMIT BUTTON -->
	
	
	
	
			<!-- CHECKBOX -->
			<div class="checkbox-fields">
				<!-- CSS REMOVES DEFAULT CHECKBOX -->
				<input type="checkbox" name="check" id="check">
				<!-- CSS REPLACES CHECKBOX WITH LABEL -->
				<label for="check"><span>Check the box</span></label>
			</div>
			<!-- \CHECKBOX -->
	
			<!-- DROPDOWN -->
			<div class="dropdown-fields">
				<select class="select" id="dropdown" name="dropdown">
					<option value="" selected>Please choose</option>
					<option value="Lemon">Lemon</option>
					<option value="Lime">Lime</option>
					<option value="Peach">Peach</option>
					<option value="Strawberry">Strawberry</option>
				</select>
			</div>
			<!-- \DROPDOWN -->
	
	
	
		</div><!-- \FORM -->
		</form>
	</div><!-- \CONTAINER -->
	
</body>
</html>
